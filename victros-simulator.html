<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VICTROS — Logic Simulator</title>
<style>
/* ====================================================================
   GLOBAL STYLES
   ==================================================================== */
:root {
  --bg-primary: #0f0f1a;
  --bg-secondary: #1a1a2e;
  --bg-card: #1e1e35;
  --bg-card-hover: #252545;
  --border: #2d2d44;
  --border-active: #4a9eff;
  --text-primary: #e8e8f0;
  --text-secondary: #9999b0;
  --text-muted: #666680;
  --accent: #4a9eff;
  --accent-dim: #2a6acc;
  --critical: #ef4444;
  --high: #f97316;
  --medium: #eab308;
  --low: #22c55e;
  --structural-risk: #ef4444;
  --structural-strength: #22c55e;
  --momentum-risk: #f97316;
  --momentum-strength: #3b82f6;
  --weak: #ef4444;
  --connected: #eab308;
  --committed: #f97316;
  --executing: #22c55e;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --mono: "SF Mono", "Fira Code", "Consolas", monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
button { font-family: var(--font); cursor: pointer; }
input, select, textarea { font-family: var(--font); }

/* ====================================================================
   TOP BAR
   ==================================================================== */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.top-bar h1 { font-size: 18px; letter-spacing: 2px; color: var(--accent); }
.top-bar h1 span { color: var(--text-muted); font-weight: 300; }
.state-badge {
  padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
  background: var(--accent-dim); color: white; letter-spacing: 0.5px;
}
.top-bar-controls { display: flex; gap: 10px; align-items: center; }
.btn {
  padding: 8px 16px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-card); color: var(--text-primary); font-size: 13px;
  transition: all 0.2s;
}
.btn:hover { background: var(--bg-card-hover); border-color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
.btn-primary:hover { background: #3a8aef; }
.btn-danger { background: #7f1d1d; border-color: #991b1b; color: #fca5a5; }
.btn-danger:hover { background: #991b1b; }
.btn-success { background: #14532d; border-color: #166534; color: #86efac; }
.btn-success:hover { background: #166534; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ====================================================================
   MAIN LAYOUT
   ==================================================================== */
.main-layout { display: flex; height: calc(100vh - 52px); }
.left-panel {
  width: 45%; overflow-y: auto; padding: 20px; border-right: 1px solid var(--border);
}
.right-panel { width: 55%; overflow-y: auto; padding: 20px; }

/* ====================================================================
   QUICK TEST PANEL
   ==================================================================== */
.quick-test {
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 20px;
}
.quick-test h3 { color: var(--accent); margin-bottom: 12px; font-size: 14px; letter-spacing: 1px; }
.quick-test-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 6px;
}
.signal-check {
  display: flex; align-items: center; gap: 8px; padding: 4px 8px;
  border-radius: 4px; font-size: 12px; cursor: pointer;
}
.signal-check:hover { background: var(--bg-card-hover); }
.signal-check input { accent-color: var(--accent); }
.signal-check label { cursor: pointer; flex: 1; }
.severity-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.sev-CRITICAL { background: var(--critical); }
.sev-HIGH { background: var(--high); }
.sev-MEDIUM { background: var(--medium); }
.sev-LOW { background: var(--low); }
.severity-badge {
  display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px;
  font-weight: 700; letter-spacing: 0.5px;
}
.sev-badge-CRITICAL { background: rgba(239,68,68,0.2); color: var(--critical); }
.sev-badge-HIGH { background: rgba(249,115,22,0.2); color: var(--high); }
.sev-badge-MEDIUM { background: rgba(234,179,8,0.2); color: var(--medium); }
.sev-badge-LOW { background: rgba(34,197,94,0.2); color: var(--low); }
.type-badge {
  display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px;
  font-weight: 600;
}
.type-structural_risk { background: rgba(239,68,68,0.15); color: #f87171; }
.type-structural_strength { background: rgba(34,197,94,0.15); color: #4ade80; }
.type-momentum_risk { background: rgba(249,115,22,0.15); color: #fb923c; }
.type-momentum_strength { background: rgba(59,130,246,0.15); color: #60a5fa; }

.quick-test-actions {
  margin-top: 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.quick-test-actions select { padding: 6px 10px; background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); border-radius: 4px; font-size: 12px; }

.lever-group-title {
  font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
  margin: 8px 0 4px; padding: 4px 8px; border-bottom: 1px solid var(--border);
  grid-column: 1 / -1;
}

/* ====================================================================
   STATE MACHINE CARDS
   ==================================================================== */
.state-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 12px; transition: all 0.3s;
}
.state-card.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(74,158,255,0.15); }
.state-card.completed { opacity: 0.6; }
.state-card.completed .state-card-body { display: none; }
.state-card.future { opacity: 0.35; }
.state-card.future .state-card-body { display: none; }
.state-card-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer;
}
.state-number {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
  font-weight: 700; background: var(--bg-secondary); color: var(--accent); font-family: var(--mono);
}
.state-name { font-size: 14px; font-weight: 600; }
.state-status {
  margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 10px;
}
.state-status.done { background: rgba(34,197,94,0.2); color: #4ade80; }
.state-status.current { background: rgba(74,158,255,0.2); color: var(--accent); }
.state-card-body { margin-top: 8px; }
.state-description { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
.state-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

/* ====================================================================
   INTAKE FORM
   ==================================================================== */
.intake-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.intake-field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.intake-field select {
  width: 100%; padding: 6px 10px; background: var(--bg-secondary); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: 4px; font-size: 12px;
}
.signal-selector { margin-top: 12px; }
.signal-selector h4 { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }

/* ====================================================================
   INSPECTOR PANEL
   ==================================================================== */
.inspector-section {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 16px;
}
.inspector-section h3 {
  font-size: 13px; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 12px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.inspector-section h4 { font-size: 12px; color: var(--text-secondary); margin: 8px 0 4px; }

.lever-row {
  display: flex; align-items: center; gap: 10px; padding: 4px 0; font-size: 12px;
}
.lever-name { flex: 1; color: var(--text-secondary); }
.lever-state {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;
}
.lever-WEAK { background: rgba(239,68,68,0.2); color: var(--weak); }
.lever-CONNECTED { background: rgba(234,179,8,0.2); color: var(--connected); }
.lever-COMMITTED { background: rgba(249,115,22,0.2); color: var(--committed); }
.lever-EXECUTING { background: rgba(34,197,94,0.2); color: var(--executing); }

.pattern-card {
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px; margin-bottom: 8px;
}
.pattern-card.primary { border-color: var(--accent); }
.pattern-card h4 { font-size: 13px; margin-bottom: 6px; }
.pattern-weight-breakdown {
  font-family: var(--mono); font-size: 11px; color: var(--text-secondary);
  background: var(--bg-primary); padding: 6px 10px; border-radius: 4px; margin: 6px 0;
}
.pattern-signals { font-size: 11px; color: var(--text-muted); margin: 4px 0; }
.sufficiency { font-size: 11px; margin: 4px 0; }
.sufficiency.pass { color: #4ade80; }
.sufficiency.fail { color: #ef4444; }

.trace-step { font-size: 12px; padding: 4px 0; color: var(--text-secondary); }
.trace-step.winner { color: var(--accent); font-weight: 600; }
.trace-step .step-num { color: var(--text-muted); font-family: var(--mono); }

.strategy-path-card {
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 12px;
}
.strategy-path-card h4 { color: var(--accent); margin-bottom: 6px; }
.strategy-path-card .sp-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.condition-list { font-size: 11px; color: var(--text-muted); padding-left: 16px; }
.condition-list li { margin-bottom: 2px; }

.action-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px; font-size: 12px;
  background: var(--bg-secondary); border-radius: 4px; margin-bottom: 4px;
  border: 1px solid var(--border);
}
.action-item .action-bullet { color: var(--accent); }

/* ====================================================================
   SCHEMA BROWSER
   ==================================================================== */
.schema-browser {
  margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px;
}
.schema-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.schema-tab {
  padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 4px; font-size: 12px; color: var(--text-secondary); cursor: pointer;
}
.schema-tab.active { background: var(--accent-dim); color: white; border-color: var(--accent); }
.schema-content { max-height: 400px; overflow-y: auto; }
.schema-search {
  width: 100%; padding: 8px 12px; background: var(--bg-card); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: 4px; font-size: 12px; margin-bottom: 8px;
}
.schema-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.schema-table th {
  text-align: left; padding: 6px 8px; background: var(--bg-secondary); color: var(--text-muted);
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
}
.schema-table td { padding: 6px 8px; border-bottom: 1px solid rgba(45,45,68,0.5); color: var(--text-secondary); }
.schema-table tr:hover td { background: var(--bg-card-hover); }

.empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeIn 0.3s ease; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.evaluating-pulse { animation: pulse 1s ease infinite; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3d3d5c; }

.collapsed .state-card-body { display: none; }
.toggle-arrow { transition: transform 0.2s; display: inline-block; font-size: 10px; color: var(--text-muted); }
.collapsed .toggle-arrow { transform: rotate(-90deg); }

/* ====================================================================
   QUALITY GATES & CONFIDENCE
   ==================================================================== */
.confidence-badge {
  display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px;
  font-weight: 700; font-family: var(--mono); margin-left: 4px;
}
.conf-high { background: rgba(239,68,68,0.2); color: var(--critical); }
.conf-med { background: rgba(234,179,8,0.2); color: var(--medium); }
.conf-low { background: rgba(34,197,94,0.2); color: var(--low); }
.evidence-indicator {
  display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px;
  font-weight: 600; background: rgba(249,115,22,0.2); color: var(--high); margin-left: 4px;
}
.evidence-input {
  width: 100%; padding: 4px 8px; background: var(--bg-secondary); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: 4px; font-size: 11px; margin-top: 4px;
}
.quality-gate-panel {
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px; margin-top: 8px;
}
.gap-item {
  padding: 4px 8px; margin: 4px 0; border-radius: 4px; font-size: 11px;
}
.gap-critical { background: rgba(239,68,68,0.15); border-left: 3px solid var(--critical); color: #fca5a5; }
.gap-warning { background: rgba(234,179,8,0.15); border-left: 3px solid var(--medium); color: #fde68a; }
.gate-toggle {
  display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary);
}
.gate-toggle input { accent-color: var(--accent); }
.ranking-row {
  display: grid; grid-template-columns: 2fr repeat(4,1fr) auto; gap: 4px; align-items: center;
  padding: 4px 6px; font-size: 11px; border-bottom: 1px solid rgba(45,45,68,0.3);
}
.ranking-row.winner { background: rgba(74,158,255,0.1); border-left: 2px solid var(--accent); }
.ranking-row.disqualified { opacity: 0.4; text-decoration: line-through; }
.ranking-header { font-weight: 700; color: var(--text-muted); font-size: 10px; text-transform: uppercase; }
.alignment-option {
  display: block; width: 100%; text-align: left; padding: 10px 14px; margin: 6px 0;
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-primary); font-size: 12px; line-height: 1.5; transition: all 0.2s;
}
.alignment-option:hover { border-color: var(--accent); background: var(--bg-card-hover); }
.alignment-option .opt-title { font-weight: 600; color: var(--accent); }
.alignment-option .opt-desc { color: var(--text-secondary); font-size: 11px; }

/* Session paused */
.paused-panel {
  text-align: center; padding: 30px; background: var(--bg-card); border-radius: 8px;
  border: 1px solid var(--border);
}
.paused-panel h3 { color: var(--accent); margin-bottom: 8px; }
.paused-panel p { color: var(--text-secondary); font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>

<!-- ====================================================================
     TOP BAR
     ==================================================================== -->
<div class="top-bar">
  <h1>VICTROS <span>— Logic Simulator</span></h1>
  <div class="top-bar-controls">
    <div class="state-badge" id="currentStateBadge">READY</div>
    <button class="btn btn-danger" onclick="resetSimulator()">Reset</button>
  </div>
</div>

<div class="main-layout">

<!-- ====================================================================
     LEFT PANEL: QUICK TEST + STATE MACHINE
     ==================================================================== -->
<div class="left-panel">

  <!-- ================================================================
       QUICK TEST
       ================================================================ -->
  <div class="quick-test" id="quickTestPanel">
    <h3>⚡ QUICK TEST — Bypass State Machine</h3>
    <div class="quick-test-actions" style="margin-bottom:12px;">
      <label style="font-size:12px;color:var(--text-secondary);">Deal Stage:</label>
      <select id="qtDealStage">
        <option value="Discovery">Discovery</option>
        <option value="Qualification">Qualification</option>
        <option value="Evaluation" selected>Evaluation</option>
        <option value="POC/Validation">POC/Validation</option>
        <option value="Negotiation">Negotiation</option>
        <option value="Closed">Closed</option>
      </select>
      <label class="gate-toggle"><input type="checkbox" id="qtGateToggle" checked onchange="enforceQualityGates=this.checked"> Quality Gates</label>
      <button class="btn btn-primary" onclick="runQuickTest()">Run Engine</button>
      <button class="btn" onclick="clearQuickTest()">Clear All</button>
      <span style="font-size:11px;color:var(--text-muted);" id="qtSignalCount">0 signals selected</span>
    </div>
    <div id="quickTestSignals"></div>
  </div>

  <!-- ================================================================
       STATE MACHINE FLOW
       ================================================================ -->
  <div id="stateMachineFlow"></div>

</div>

<!-- ====================================================================
     RIGHT PANEL: DECISION ENGINE INSPECTOR
     ==================================================================== -->
<div class="right-panel">
  <div id="inspectorPanel">
    <div class="empty-state" id="inspectorEmpty">
      <p style="font-size:24px;margin-bottom:10px;">🔍</p>
      <p>Select signals and run the engine to see results.</p>
      <p style="margin-top:6px;font-size:11px;">Use Quick Test above or walk through the State Machine.</p>
    </div>
    <div id="inspectorResults" style="display:none;"></div>
  </div>

  <!-- ================================================================
       SCHEMA BROWSER
       ================================================================ -->
  <div class="schema-browser">
    <h3 style="font-size:13px;color:var(--accent);margin-bottom:8px;letter-spacing:1px;">📚 SCHEMA BROWSER</h3>
    <div class="schema-tabs" id="schemaTabs"></div>
    <input type="text" class="schema-search" id="schemaSearch" placeholder="Search schema..." oninput="filterSchemaTable()">
    <div class="schema-content" id="schemaContent"></div>
  </div>
</div>

</div>

<!-- ====================================================================
     EMBEDDED SCHEMA DATA
     ==================================================================== -->
<script>
const SIGNALS = [
  {
    "key": "problem_not_validated",
    "name": "Problem Not Validated",
    "description": "Pain is mentioned, but no specific problem with measurable business impact has been established",
    "observable_condition": "Buyer confirms pain or interest but has not described a specific problem with measurable impact or consequence",
    "polarity": "negative",
    "severity": "CRITICAL",
    "type": "structural_risk",
    "affected_levers": [
      "case_for_change_strength",
      "buyer_urgency"
    ],
    "zone_bias": [
      "zone1",
      "zone2"
    ],
    "trigger_input_conditions": "Pain field populated AND Measurable Impact field empty OR user states no measurable business impact if problem is not solved",
    "target_patterns": [
      "weak_problem_definition"
    ],
    "confidence_threshold": 0.7,
    "requires_evidence": true,
    "calibration_note": "HIGH = buyer confirms no measurable impact; LOW = impact mentioned but not quantified"
  },
  {
    "key": "outcomes_unclear_or_misaligned",
    "name": "Outcomes Unclear or Misaligned",
    "description": "Buyer has not defined a clear future state or success outcome tied to the initiative",
    "observable_condition": "Buyer discusses features or capabilities but has not described desired future outcomes or success criteria",
    "polarity": "negative",
    "severity": "HIGH",
    "type": "structural_risk",
    "affected_levers": [
      "case_for_change_strength",
      "buyer_urgency"
    ],
    "zone_bias": [
      "zone1",
      "zone2"
    ],
    "trigger_input_conditions": "Desired Outcomes field empty OR buyer discusses solution capabilities without defining future business outcomes",
    "target_patterns": [
      "outcome_misalignment"
    ],
    "confidence_threshold": 0.5,
    "requires_evidence": false,
    "calibration_note": "HIGH = buyer discusses features only with no outcomes; LOW = outcomes mentioned but vague"
  },
  {
    "key": "buyer_objections_surfacing_early",
    "name": "Buyer Objections Surfacing Early",
    "description": "Buyer raises objections before the case for change and differentiation are established",
    "observable_condition": "Buyer raises objections about priority, approach, or price before desired outcomes or the case for change are validated",
    "polarity": "negative",
    "severity": "MEDIUM",
    "type": "structural_risk",
    "affected_levers": [
      "case_for_change_strength",
      "differentiation_leverage"
    ],
    "zone_bias": [
      "zone1",
      "zone2"
    ],
    "trigger_input_conditions": "Buyer raises objection related to price, priority, or approach AND Desired Outcomes field empty AND Measurable Impact field empty",
    "target_patterns": [
      "messaging_disconnect",
      "weak_problem_definition"
    ],
    "confidence_threshold": 0.3,
    "requires_evidence": false,
    "calibration_note": "HIGH = objections raised before case for change; LOW = minor pushback noted"
  },
  {
    "key": "no_differentiated_decision_criteria",
    "name": "No Differentiated Decision Criteria",
    "description": "Buyer\u2019s evaluation criteria do not reflect your differentiated strengths",
    "observable_condition": "Decision criteria are stated, but none uniquely favor your differentiated strengths or outcomes",
    "polarity": "negative",
    "severity": "MEDIUM",
    "type": "structural_risk",
    "affected_levers": [
      "differentiation_leverage",
      "buyer_consensus"
    ],
    "zone_bias": [
      "zone1",
      "zone2",
      "zone3"
    ],
    "trigger_input_conditions": "Competitive Landscape indicates multiple vendors AND Desired Outcomes field populated AND Measurable Impact field populated AND buyer language does not reference differentiated strengths",
    "target_patterns": [
      "commodity_relegation",
      "competitive_mindshare"
    ],
    "confidence_threshold": 0.3,
    "requires_evidence": false,
    "calibration_note": "HIGH = criteria actively favor competitor; LOW = criteria are generic"
  },
  {
    "key": "no_named_or_active_champion",
    "name": "No Named or Active Champion",
    "description": "No stakeholder is actively advocating, coaching, or driving the deal internally",
    "observable_condition": "No stakeholder is providing internal insight, introducing others, or taking actions to advance the decision",
    "polarity": "negative",
    "severity": "CRITICAL",
    "type": "structural_risk",
    "affected_levers": [
      "champion_strength",
      "buyer_consensus"
    ],
    "zone_bias": [
      "zone1",
      "zone2",
      "zone3",
      "zone4"
    ],
    "trigger_input_conditions": "Champion Status field empty OR Champion Status indicates passive or neutral behavior",
    "target_patterns": [
      "champion_absence"
    ],
    "confidence_threshold": 0.7,
    "requires_evidence": true,
    "calibration_note": "HIGH = no stakeholder takes any internal action; LOW = passive supporter identified"
  },
  {

<script>
/* ---- Constants ---- */
const LEVER_ORDER = [
  "case_for_change_strength","champion_strength","economic_buyer_commitment",
  "decision_process_alignment","buyer_consensus","differentiation_leverage","buyer_urgency"
];
const ZONE_ORDER = ["zone1","zone2","zone3","zone4"];
const SEVERITY_WEIGHT = {"CRITICAL":4,"HIGH":3,"MEDIUM":2,"LOW":1};
const STRUCTURAL_BONUS = 1.0;
const LEVER_WEIGHT = 1.0;
const STRUCTURAL_TYPES = new Set(["structural_risk","structural_strength"]);
const LEVER_SCORE = {"WEAK":1,"CONNECTED":2,"COMMITTED":3,"EXECUTING":4};

/* ---- Helper: looks like signal key ---- */
function looksLikeSignalKey(s) {
  return !s.trim().includes(" ") && s.trim().length < 60;
}

/* ---- Helper: get zone from deal stage ---- */
function getZoneForStage(dealStage) {
  const map = {
    "Discovery":"zone1","Qualification":"zone1",
    "Evaluation":"zone2",
    "POC/Validation":"zone3",
    "Negotiation":"zone4","Closed":"zone4"
  };
  return map[dealStage] || "zone2";
}

/* ---- E1: Signal Evaluation (lever states) ---- */
function evaluateSignals(activeSignalKeys) {
  const leverStates = {};
  LEVER_ORDER.forEach(lk => leverStates[lk] = "WEAK");
  activeSignalKeys.forEach(sigKey => {
    const signal = SIGNALS.find(s => s.key === sigKey);
    if (!signal) return;
    if (signal.polarity === "positive") {
      signal.affected_levers.forEach(lk => {
        if (lk in leverStates && leverStates[lk] === "WEAK") {
          leverStates[lk] = "CONNECTED";
        }
      });
    }
  });
  return leverStates;
}

/* ---- E2: Signal-to-Pattern Mapping ---- */
function activatePatterns(activeSignalKeys) {
  const signalObjects = activeSignalKeys.map(k => SIGNALS.find(s => s.key === k)).filter(Boolean);
  const targetedKeys = new Set();
  signalObjects.forEach(s => {
    (s.target_patterns || []).forEach(pk => targetedKeys.add(pk));
  });
  return PATTERNS.filter(p => targetedKeys.has(p.key));
}

/* ---- E3: PatternWeight Computation ---- */
function computePatternWeights(patterns, activeSignalKeys, leverStates) {
  const signalObjects = activeSignalKeys.map(k => SIGNALS.find(s => s.key === k)).filter(Boolean);
  
  // Group signals by target pattern
  const patternSignals = {};
  patterns.forEach(p => patternSignals[p.key] = []);
  signalObjects.forEach(signal => {
    (signal.target_patterns || []).forEach(pk => {
      if (pk in patternSignals) patternSignals[pk].push(signal);
    });
  });

  // Find weakest lever
  const weakestLever = LEVER_ORDER.reduce((weakest, lk) => {
    const score = LEVER_SCORE[leverStates[lk] || "WEAK"] || 1;
    const weakestScore = LEVER_SCORE[leverStates[weakest] || "WEAK"] || 1;
    return score < weakestScore ? lk : weakest;
  }, LEVER_ORDER[0]);

  const weights = {};
  const breakdowns = {};
  
  patterns.forEach(p => {
    const contributing = patternSignals[p.key] || [];
    if (contributing.length === 0) {
      weights[p.key] = 0;
      breakdowns[p.key] = { severity: 0, structural: 0, density: 0, lever: 0, total: 0, contributing: [], weakestLever };
      return;
    }
    const highestSev = Math.max(...contributing.map(s => SEVERITY_WEIGHT[s.severity] || 1));
    const hasStructural = contributing.some(s => STRUCTURAL_TYPES.has(s.type));
    const structuralBonus = hasStructural ? STRUCTURAL_BONUS : 0;
    const density = contributing.length > 1 ? (contributing.length - 1) * 0.5 : 0;
    const targetsWeakest = (p.affected_levers || []).includes(weakestLever);
    const leverBonus = targetsWeakest ? LEVER_WEIGHT : 0;
    const total = highestSev + structuralBonus + density + leverBonus;
    
    weights[p.key] = total;
    breakdowns[p.key] = {
      severity: highestSev, structural: structuralBonus, density, lever: leverBonus,
      total, contributing: contributing.map(s => s.key), weakestLever
    };
  });
  
  return { weights, breakdowns };
}

/* ---- Part 5: Sufficiency Check ---- */
function sufficientAuthority(pattern, activeSignalKeys) {
  const signalObjects = activeSignalKeys.map(k => SIGNALS.find(s => s.key === k)).filter(Boolean);
  const contributing = signalObjects.filter(s => (s.target_patterns || []).includes(pattern.key));
  if (contributing.some(s => STRUCTURAL_TYPES.has(s.type))) return true;
  const highCrit = contributing.filter(s => (SEVERITY_WEIGHT[s.severity] || 1) >= 3);
  return highCrit.length >= 2;
}

/* ---- E4: Priority Pattern Selection (6-step tiebreaker) ---- */
function selectPriorityPattern(patterns, weights) {
  if (patterns.length === 1) return { winner: patterns[0], trace: [{ step: 1, desc: "Only one pattern", winner: patterns[0].key }] };
  
  const TYPE_ORDER = {"structural_risk":4,"structural_strength":3,"momentum_risk":2,"momentum_strength":1};
  
  function sortKey(p) {
    const w = -(weights[p.key] || 0);
    const sev = -(SEVERITY_WEIGHT[p.severity] || 1);
    const struct = -(TYPE_ORDER[p.type] || 0);
    const leverIdx = Math.min(...(p.affected_levers || []).map(lk => {
      const idx = LEVER_ORDER.indexOf(lk);
      return idx >= 0 ? idx : 99;
    }).concat([99]));
    const zoneBiases = Array.isArray(p.zone_bias) ? p.zone_bias : [p.zone_bias];
    const zoneIdx = Math.min(...zoneBiases.map(z => {
      const idx = ZONE_ORDER.indexOf(z);
      return idx >= 0 ? idx : 99;
    }).concat([99]));
    return [w, sev, struct, leverIdx, zoneIdx];
  }

  // Build trace
  const trace = [];
  let candidates = [...patterns];
  const steps = [
    { name: "PatternWeight", extract: p => weights[p.key] || 0, higher: true },
    { name: "PatternSeverity", extract: p => SEVERITY_WEIGHT[p.severity] || 1, higher: true },
    { name: "Structural Precedence", extract: p => TYPE_ORDER[p.type] || 0, higher: true },
    { name: "Lever Priority", extract: p => Math.min(...(p.affected_levers||[]).map(lk => { const i=LEVER_ORDER.indexOf(lk); return i>=0?i:99; }).concat([99])), higher: false },
    { name: "Earliest Zone", extract: p => { const zb=Array.isArray(p.zone_bias)?p.zone_bias:[p.zone_bias]; return Math.min(...zb.map(z => { const i=ZONE_ORDER.indexOf(z); return i>=0?i:99; }).concat([99])); }, higher: false },
    { name: "Stable sort", extract: p => 0, higher: true }
  ];

  for (let i = 0; i < steps.length; i++) {
    const step = steps[i];
    const values = candidates.map(p => ({ p, v: step.extract(p) }));
    const bestVal = step.higher ? Math.max(...values.map(x=>x.v)) : Math.min(...values.map(x=>x.v));
    const winners = values.filter(x => x.v === bestVal).map(x => x.p);
    
    if (winners.length === 1) {
      trace.push({ step: i+1, desc: step.name, winner: winners[0].key, value: bestVal, resolved: true });
      return { winner: winners[0], trace };
    } else {
      trace.push({ step: i+1, desc: step.name, winner: null, value: bestVal, resolved: false, tiedCount: winners.length });
      candidates = winners;
    }
  }
  
  // Fallback to sorted order
  const sorted = [...patterns].sort((a,b) => {
    const ka = sortKey(a), kb = sortKey(b);
    for (let i=0;i<ka.length;i++) { if (ka[i]!==kb[i]) return ka[i]-kb[i]; }
    return 0;
  });
  trace.push({ step: 6, desc: "Stable sort (fallback)", winner: sorted[0].key, resolved: true });
  return { winner: sorted[0], trace };
}

/* ---- E6: StrategyPath Selection (Composite Ranking, Phase 3) ---- */

/* Lever alignment: paths targeting weak levers score higher */
function leverAlignmentScore(sp, leverStates) {
  const LEVER_STATE_POINTS = { "WEAK": 2, "CONNECTED": 1 };
  const points = (sp.target_levers || []).map(lever => LEVER_STATE_POINTS[leverStates[lever]] || 0);
  if (points.length === 0) return 0;
  const raw = points[0] * 2 + points.slice(1).reduce((a,b) => a+b, 0);
  return Math.min(raw, 5);
}

/* Resolution type match: path mode vs pattern resolution_type */
function resolutionMatchScore(sp, pattern) {
  if (sp.mode === pattern.resolution_type) return 3;
  const pType = (pattern.type || "").toLowerCase();
  const severity = (pattern.severity || "").toUpperCase();
  if (pType.includes("risk") && sp.mode === "RECOVER") return 1;
  if (pType.includes("strength") && sp.mode === "ADVANCE") return 1;
  if (sp.mode === "EXIT" && severity === "CRITICAL") return 1;
  return 0;
}

/* Entry condition strength: count satisfied signal-key entry conditions */
function entryConditionStrength(sp, signalSet) {
  return (sp.entry_conditions || []).filter(ec => looksLikeSignalKey(ec) && signalSet.has(ec)).length;
}

/* Composite score */
function scoreStrategyPath(sp, pattern, leverStates, signalSet) {
  return leverAlignmentScore(sp, leverStates) 
    + resolutionMatchScore(sp, pattern) 
    + entryConditionStrength(sp, signalSet);
}

function selectStrategyPath(pattern, activeSignalKeys, zoneKey, leverStates) {
  const signalSet = new Set(activeSignalKeys);
  const allCandidates = [];
  
  (pattern.candidate_strategy_path_keys || []).forEach(spKey => {
    const sp = STRATEGY_PATHS.find(s => s.key === spKey);
    if (!sp) return;
    
    const disqSignals = (sp.disqualifying_conditions || []).filter(dc => looksLikeSignalKey(dc));
    const isDisqualified = disqSignals.some(dc => signalSet.has(dc));
    
    const entrySignals = (sp.entry_conditions || []).filter(ec => looksLikeSignalKey(ec));
    const entryFailed = entrySignals.length > 0 && !entrySignals.some(ec => signalSet.has(ec));
    
    const leverScore = leverAlignmentScore(sp, leverStates || {});
    const resScore = resolutionMatchScore(sp, pattern);
    const entryScore = entryConditionStrength(sp, signalSet);
    const totalScore = leverScore + resScore + entryScore;
    
    allCandidates.push({
      sp, isDisqualified, entryFailed,
      leverScore, resScore, entryScore, totalScore,
      disqualifyReason: isDisqualified ? 'Disqualifying signal active' : (entryFailed ? 'Entry conditions not met' : null)
    });
  });
  
  // Store ranking data globally for inspector
  strategyRankingData = allCandidates;
  
  // Filter to eligible candidates and sort by composite score
  const eligible = allCandidates.filter(c => !c.isDisqualified && !c.entryFailed);
  eligible.sort((a, b) => b.totalScore - a.totalScore);
  
  return eligible.length > 0 ? eligible[0].sp : null;
}

/* ---- Get actions for strategy path ---- */
function getActions(strategyPath) {
  if (!strategyPath) return [];
  const actionKeys = new Set(strategyPath.representative_actions || []);
  return REPRESENTATIVE_ACTIONS.filter(a => actionKeys.has(a.action_key));
}

/* ---- Engine globals (used by quality gates + ranking) ---- */
let enforceQualityGates = true;
let qualityGateResult = null;
let evidenceTexts = {};
let strategyRankingData = null;

/* ---- Quality Gates (Phase 2) ---- */
function detectSignalGaps(activeSignalKeys) {
  const leverPositive = {};
  const leverNegative = {};
  LEVER_ORDER.forEach(lk => { leverPositive[lk] = []; leverNegative[lk] = []; });
  
  activeSignalKeys.forEach(key => {
    const sig = SIGNALS.find(s => s.key === key);
    if (!sig) return;
    sig.affected_levers.forEach(lever => {
      if (sig.polarity === "positive") leverPositive[lever].push(key);
      else leverNegative[lever].push(key);
    });
  });
  
  const gaps = [];
  LEVER_ORDER.forEach(lever => {
    const total = [...leverPositive[lever], ...leverNegative[lever]];
    if (total.length === 0) {
      const hasCritical = SIGNALS.some(s => s.affected_levers.includes(lever) && s.severity === "CRITICAL");
      gaps.push({
        lever_name: lever,
        gap_type: "uncovered",
        severity: hasCritical ? "critical" : "warning",
        missing_signal_keys: SIGNALS.filter(s => s.affected_levers.includes(lever)).map(s => s.key)
      });
    } else if (leverNegative[lever].length > 0 && leverPositive[lever].length === 0) {
      gaps.push({
        lever_name: lever,
        gap_type: "polarity_imbalance",
        severity: "warning",
        missing_signal_keys: SIGNALS.filter(s => s.affected_levers.includes(lever) && s.polarity === "positive").map(s => s.key)
      });
    }
  });
  return gaps;
}

function checkEvidenceRequirements(activeSignalKeys) {
  const needsEvidence = [];
  activeSignalKeys.forEach(key => {
    const sig = SIGNALS.find(s => s.key === key);
    if (sig && sig.requires_evidence && !(evidenceTexts[key] && evidenceTexts[key].trim())) {
      needsEvidence.push(key);
    }
  });
  return needsEvidence;
}

function runQualityGates(activeSignalKeys) {
  const gaps = detectSignalGaps(activeSignalKeys);
  const missingEvidence = checkEvidenceRequirements(activeSignalKeys);
  const criticalGaps = gaps.filter(g => g.severity === "critical");
  const warningGaps = gaps.filter(g => g.severity === "warning");
  const blocked = criticalGaps.length > 0;
  
  // Build lever coverage map
  const leverCoverage = {};
  LEVER_ORDER.forEach(lk => { leverCoverage[lk] = { positive: [], negative: [] }; });
  activeSignalKeys.forEach(key => {
    const sig = SIGNALS.find(s => s.key === key);
    if (!sig) return;
    sig.affected_levers.forEach(lever => {
      if (lever in leverCoverage) {
        leverCoverage[lever][sig.polarity === "positive" ? "positive" : "negative"].push(key);
      }
    });
  });
  
  return { gaps, criticalGaps, warningGaps, missingEvidence, blocked, leverCoverage };
}

/* ---- FULL ENGINE RUN (updated with quality gates + composite ranking) ---- */
function runEngine(activeSignalKeys, dealStage, excludedPats, useQualityGates) {
  excludedPats = excludedPats || new Set();
  if (useQualityGates === undefined) useQualityGates = enforceQualityGates;
  
  const leverStates = evaluateSignals(activeSignalKeys);
  const zoneKey = getZoneForStage(dealStage);
  
  // Run quality gates
  qualityGateResult = runQualityGates(activeSignalKeys);
  
  // If critical gap and gates enforced, return early
  if (useQualityGates && qualityGateResult.blocked) {
    return { leverStates, zoneKey, activated: [], weights: {}, breakdowns: {}, sufficient: [],
              insufficient: [], primary: null, secondary: [], strategyPath: null, actions: [], trace: [],
              activeSignals: activeSignalKeys, qualityGates: qualityGateResult, gateBlocked: true,
              strategyRanking: null };
  }
  
  // Filter out signals needing evidence (when gates enforced)
  let filteredSignals = activeSignalKeys;
  if (useQualityGates && qualityGateResult.missingEvidence.length > 0) {
    filteredSignals = activeSignalKeys.filter(k => !qualityGateResult.missingEvidence.includes(k));
  }
  
  const activated = activatePatterns(filteredSignals).filter(p => !excludedPats.has(p.key));
  
  if (activated.length === 0) {
    return { leverStates, zoneKey, activated: [], weights: {}, breakdowns: {}, sufficient: [],
              insufficient: [], primary: null, secondary: [], strategyPath: null, actions: [], trace: [],
              activeSignals: activeSignalKeys, qualityGates: qualityGateResult, gateBlocked: false,
              strategyRanking: null };
  }
  
  const { weights, breakdowns } = computePatternWeights(activated, filteredSignals, leverStates);
  
  const sufficient = activated.filter(p => sufficientAuthority(p, filteredSignals));
  const insufficient = activated.filter(p => !sufficientAuthority(p, filteredSignals));
  
  if (sufficient.length === 0) {
    return { leverStates, zoneKey, activated, weights, breakdowns, sufficient: [], insufficient: activated,
              primary: null, secondary: [], strategyPath: null, actions: [], trace: [],
              activeSignals: activeSignalKeys, qualityGates: qualityGateResult, gateBlocked: false,
              strategyRanking: null };
  }
  
  const { winner: primary, trace } = selectPriorityPattern(sufficient, weights);
  const secondary = activated.filter(p => p.key !== primary.key);
  const strategyPath = selectStrategyPath(primary, filteredSignals, zoneKey, leverStates);
  const actions = getActions(strategyPath);
  
  return { leverStates, zoneKey, activated, weights, breakdowns, sufficient, insufficient,
            primary, secondary, strategyPath, actions, trace, activeSignals: activeSignalKeys,
            qualityGates: qualityGateResult, gateBlocked: false,
            strategyRanking: strategyRankingData };
}

  { id:"S11", name:"MONITORING",              desc:"Track progress and decide next steps.", controls:"monitoring" },
  { id:"S12", name:"RE_EVALUATING",           desc:"Re-run engine with updated signals.", controls:"reevaluating" },
  { id:"S13", name:"SESSION_PAUSED",          desc:"Session paused. Your progress is saved.", controls:"paused" },
  { id:"S14", name:"SESSION_COMPLETE",        desc:"Session complete. Start a new deal or review.", controls:"complete" }
];

const VALID_TRANSITIONS = {
  "NEW_SESSION": ["INTENT_CAPTURE"],
  "INTENT_CAPTURE": ["SITUATION_VALIDATION"],
  "SITUATION_VALIDATION": ["INTAKE", "INTENT_CAPTURE"],
  "INTAKE": ["AWAITING_CONFIRMATION"],
  "AWAITING_CONFIRMATION": ["EVALUATING", "INTAKE"],
  "EVALUATING": ["PATTERN_DIAGNOSTICS", "INTAKE"],
  "PATTERN_DIAGNOSTICS": ["PRESENTING_DIAGNOSIS", "INTAKE"],
  "PRESENTING_DIAGNOSIS": ["ALIGNMENT_CHECKPOINT"],
  "ALIGNMENT_CHECKPOINT": ["ACTION_SELECTION", "DUAL_PATTERN_TRADEOFF", "INTAKE", "ALIGNMENT_CHECKPOINT"],
  "DUAL_PATTERN_TRADEOFF": ["ACTION_SELECTION"],
  "ACTION_SELECTION": ["MONITORING"],
  "MONITORING": ["MONITORING", "RE_EVALUATING", "SESSION_COMPLETE", "SESSION_PAUSED"],
  "RE_EVALUATING": ["PRESENTING_DIAGNOSIS", "MONITORING", "SESSION_COMPLETE"],
  "SESSION_PAUSED": ["MONITORING", "INTENT_CAPTURE"],
  "SESSION_COMPLETE": ["INTENT_CAPTURE"]
};

let currentStateIdx = -1;
let stateData = {};
let engineResult = null;
let excludedPatterns = new Set();

/* ---- Initialize Quick Test Signals ---- */
function initQuickTest() {
  const container = document.getElementById("quickTestSignals");
  const groups = {};
  SIGNALS.forEach(s => {
    const lever = s.affected_levers[0] || "other";
    if (!groups[lever]) groups[lever] = [];
    groups[lever].push(s);
  });
  
  let html = '<div class="quick-test-grid">';
  LEVER_ORDER.forEach(lever => {
    if (!groups[lever]) return;
    const leverObj = LEVERS.find(l => l.key === lever);
    const leverName = leverObj ? leverObj.name : lever;
    html += `<div class="lever-group-title">${leverName}</div>`;
    groups[lever].forEach(s => {
      const confClass = s.confidence_threshold >= 0.7 ? 'conf-high' : s.confidence_threshold >= 0.5 ? 'conf-med' : 'conf-low';
      html += `<div class="signal-check">
        <input type="checkbox" id="qt_${s.key}" value="${s.key}" onchange="updateQtCount()">
        <span class="severity-dot sev-${s.severity}"></span>
        <label for="qt_${s.key}">${s.name}</label>
        <span class="confidence-badge ${confClass}">${s.confidence_threshold}</span>
        ${s.requires_evidence ? '<span class="evidence-indicator">EVD</span>' : ''}
        <span class="type-badge type-${s.type}">${s.type.replace('_',' ')}</span>
      </div>
      ${s.requires_evidence ? `<input type="text" class="evidence-input" id="qt_ev_${s.key}" placeholder="Evidence required..." style="display:none;margin:0 0 4px 24px;width:calc(100% - 24px);">` : ''}`;
    });
  });
  html += '</div>';
  container.innerHTML = html;
  
  // Show/hide evidence inputs based on checkbox
  document.querySelectorAll('#quickTestSignals input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', function() {
      const evInput = document.getElementById('qt_ev_' + this.value);
      if (evInput) evInput.style.display = this.checked ? 'block' : 'none';
    });
  });
}

function getQtSelectedSignals() {
  return Array.from(document.querySelectorAll('#quickTestSignals input:checked')).map(cb => cb.value);
}

function updateQtCount() {
  const count = getQtSelectedSignals().length;
  document.getElementById("qtSignalCount").textContent = count + " signals selected";
}

function clearQuickTest() {
  document.querySelectorAll('#quickTestSignals input:checked').forEach(cb => cb.checked = false);
  updateQtCount();
  document.getElementById("inspectorResults").style.display = "none";
  document.getElementById("inspectorEmpty").style.display = "block";
}

function runQuickTest() {
  const signals = getQtSelectedSignals();
  if (signals.length === 0) { alert("Select at least one signal."); return; }
  // Collect evidence texts
  evidenceTexts = {};
  signals.forEach(sk => {
    const evInput = document.getElementById('qt_ev_' + sk);
    if (evInput && evInput.value.trim()) evidenceTexts[sk] = evInput.value.trim();
  });
  const dealStage = document.getElementById("qtDealStage").value;
  const useGates = document.getElementById("qtGateToggle").checked;
  engineResult = runEngine(signals, dealStage, excludedPatterns, useGates);
  renderInspector(engineResult);
}

/* ---- Render Inspector Panel ---- */
function renderInspector(result) {
  document.getElementById("inspectorEmpty").style.display = "none";
  const container = document.getElementById("inspectorResults");
  container.style.display = "block";
  
  let html = '';
  
  // 1. Active Signals
  html += `<div class="inspector-section animate-in">
    <h3>🔔 Active Signals (${result.activeSignals.length})</h3>`;
  result.activeSignals.forEach(sk => {
    const s = SIGNALS.find(x => x.key === sk);
    if (!s) return;
    html += `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px;">
      <span class="severity-badge sev-badge-${s.severity}">${s.severity}</span>
      <span class="type-badge type-${s.type}">${s.type.replace('_',' ')}</span>
      <span>${s.name}</span>
    </div>`;
  });
  html += `</div>`;
  
  // 2. Lever States
  html += `<div class="inspector-section animate-in">
    <h3>📊 Lever States</h3>`;
  LEVER_ORDER.forEach(lk => {
    const leverObj = LEVERS.find(l => l.key === lk);
    const name = leverObj ? leverObj.name : lk;
    const state = result.leverStates[lk] || "WEAK";
    html += `<div class="lever-row">
      <span class="lever-name">${name}</span>
      <span class="lever-state lever-${state}">${state}</span>
    </div>`;
  });
  html += `<div style="font-size:11px;color:var(--text-muted);margin-top:8px;">Zone: ${result.zoneKey}</div>`;
  html += `</div>`;
  
  // 3. Activated Patterns
  html += `<div class="inspector-section animate-in">
    <h3>🎯 Activated Patterns (${result.activated.length})</h3>`;
  if (result.activated.length === 0) {
    html += `<div style="font-size:12px;color:var(--text-muted);">No patterns activated.</div>`;
  }
  result.activated.forEach(p => {
    const isPrimary = result.primary && p.key === result.primary.key;
    const bd = result.breakdowns[p.key] || {};
    const isSufficient = result.sufficient.some(sp => sp.key === p.key);
    html += `<div class="pattern-card ${isPrimary ? 'primary' : ''}">
      <h4>${isPrimary ? '⭐ ' : ''}${p.name} <span style="font-size:11px;color:var(--text-muted);">(${p.key})</span></h4>
      <div style="display:flex;gap:6px;margin:4px 0;">
        <span class="severity-badge sev-badge-${p.severity}">${p.severity}</span>
        <span class="type-badge type-${p.type}">${p.type.replace('_',' ')}</span>
      </div>
      <div class="pattern-weight-breakdown">
        severity(${bd.severity||0}) + structural(${bd.structural||0}) + density(${bd.density||0}) + lever(${bd.lever||0}) = <strong>${bd.total||0}</strong>
      </div>
      <div class="pattern-signals">Contributing: ${(bd.contributing||[]).join(', ') || 'none'}</div>
      <div class="pattern-signals" style="font-size:10px;">Weakest lever: ${bd.weakestLever||'?'} — pattern targets: ${(p.affected_levers||[]).join(', ')}</div>
      <div class="sufficiency ${isSufficient ? 'pass' : 'fail'}">${isSufficient ? '✓ Sufficient authority' : '✗ Insufficient authority'}</div>
    </div>`;
  });
  html += `</div>`;
  
  // 4. Priority Selection Trace
  html += `<div class="inspector-section animate-in">
    <h3>🏆 Priority Pattern Selection Trace</h3>`;
  if (!result.primary) {
    html += `<div style="font-size:12px;color:var(--text-muted);">No pattern selected (insufficient authority or no patterns).</div>`;
  } else if (result.trace.length > 0) {
    result.trace.forEach(t => {
      const isWinner = t.resolved;
      html += `<div class="trace-step ${isWinner ? 'winner' : ''}">
        <span class="step-num">Step ${t.step}:</span> ${t.desc} — 
        ${isWinner 
          ? `<strong>winner: ${t.winner}</strong> (value: ${t.value})` 
          : `Tie (${t.tiedCount} patterns at value ${t.value}) → next step`}
      </div>`;
    });
    html += `<div style="margin-top:8px;font-size:13px;color:var(--accent);font-weight:600;">
      Priority Pattern: ${result.primary.name}
    </div>`;
  }
  html += `</div>`;
  
  // 5. Secondary Patterns
  if (result.secondary.length > 0) {
    html += `<div class="inspector-section animate-in">
      <h3>📋 Secondary Patterns (${result.secondary.length})</h3>`;
    // Show top 1 by weight
    const sorted = [...result.secondary].sort((a,b) => (result.weights[b.key]||0)-(result.weights[a.key]||0));
    const top = sorted[0];
    html += `<div style="font-size:12px;padding:4px 0;">
      <strong>${top.name}</strong> — weight: ${result.weights[top.key]||0}
      <span class="severity-badge sev-badge-${top.severity}" style="margin-left:6px;">${top.severity}</span>
    </div>`;
    if (sorted.length > 1) {
      html += `<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">+ ${sorted.length-1} more secondary pattern(s)</div>`;
    }
    html += `</div>`;
  }
  
  // 6. Strategy Path
  html += `<div class="inspector-section animate-in">
    <h3>🛤️ Selected Strategy Path</h3>`;
  if (!result.strategyPath) {
    html += `<div style="font-size:12px;color:var(--text-muted);">No strategy path selected.</div>`;
  } else {
    const sp = result.strategyPath;
    html += `<div class="strategy-path-card">
      <h4>${sp.display_name}</h4>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">Key: ${sp.key} | Mode: ${sp.mode}</div>
      <div class="sp-desc">${sp.description}</div>
      <h4 style="font-size:11px;margin-top:8px;">Entry Conditions:</h4>
      <ul class="condition-list">${(sp.entry_conditions||[]).map(c => `<li>${c}</li>`).join('')}</ul>
      <h4 style="font-size:11px;margin-top:8px;">Disqualifying Conditions:</h4>
      <ul class="condition-list">${(sp.disqualifying_conditions||[]).map(c => `<li>${c}</li>`).join('')}</ul>
      <h4 style="font-size:11px;margin-top:8px;">Strategic Focus:</h4>
      <div style="font-size:12px;color:var(--text-secondary);">${sp.strategic_focus}</div>
    </div>`;
  }
  html += `</div>`;
  
  // 7. Representative Actions
  html += `<div class="inspector-section animate-in">
    <h3>⚡ Representative Actions (${result.actions.length})</h3>`;
  if (result.actions.length === 0) {
    html += `<div style="font-size:12px;color:var(--text-muted);">No actions available.</div>`;
  }
  result.actions.forEach(a => {
    html += `<div class="action-item">
      <span class="action-bullet">▸</span>
      <span>${a.ux_text || a.description}</span>
    </div>`;
  });
  html += `</div>`;
  
  container.innerHTML = html;
}

/* ---- State Machine ---- */
function initStateMachine() {
  const container = document.getElementById("stateMachineFlow");
  let html = '';
  STATES.forEach((state, idx) => {
    const stateClass = idx === 0 ? '' : 'future';
    html += `<div class="state-card ${stateClass}" id="state-${idx}">
      <div class="state-card-header" onclick="toggleStateCard(${idx})">
        <span class="toggle-arrow">▼</span>
        <span class="state-number">${state.id}</span>
        <span class="state-name">${state.name}</span>
        <span class="state-status" id="state-status-${idx}"></span>
      </div>
      <div class="state-description">${state.desc}</div>
      <div class="state-card-body" id="state-body-${idx}"></div>
    </div>`;
  });
  container.innerHTML = html;
  renderStateControls(0);
}

function toggleStateCard(idx) {
  const card = document.getElementById(`state-${idx}`);
  if (card.classList.contains('completed') || card.classList.contains('future')) {
    card.classList.toggle('collapsed');
  }
}

function renderStateControls(idx) {
  const state = STATES[idx];
  const body = document.getElementById(`state-body-${idx}`);
  
  switch(state.controls) {
    case 'start':
      body.innerHTML = `<div class="state-controls"><button class="btn btn-primary" onclick="advanceState()">Start Session</button></div>`;
      break;
    case 'intent':
      body.innerHTML = `<textarea id="dealIntent" rows="3" style="width:100%;padding:8px;background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;font-size:12px;resize:vertical;" placeholder="Describe the deal situation..."></textarea>
        <div class="state-controls"><button class="btn btn-primary" onclick="advanceState()">Submit</button></div>`;
      break;
    case 'validate':
      body.innerHTML = `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;padding:8px;background:var(--bg-secondary);border-radius:4px;">"${stateData.intent || 'No description provided.'}"</div>
        <div class="state-controls">
          <button class="btn btn-success" onclick="advanceState()">Confirm</button>
          <button class="btn" onclick="goToState(1)">Correct</button>
        </div>`;
      break;
    case 'intake':
      body.innerHTML = renderIntakeForm();
      break;
    case 'confirm':
      body.innerHTML = renderConfirmation();
      break;
    case 'evaluating':
      body.innerHTML = `<div class="evaluating-pulse" style="text-align:center;padding:20px;font-size:14px;color:var(--accent);">Running Decision Engine...</div>`;
      setTimeout(() => {
        const signals = stateData.selectedSignals || [];
        const dealStage = stateData.dealStage || "Evaluation";
        engineResult = runEngine(signals, dealStage);
        renderInspector(engineResult);
        if (!engineResult.primary) {
          body.innerHTML = `<div style="color:var(--text-muted);font-size:12px;padding:10px;">No patterns activated or insufficient authority. Return to intake.</div>
            <div class="state-controls"><button class="btn" onclick="goToState(3)">Back to Intake</button></div>`;
        } else {
          body.innerHTML = `<div style="color:#4ade80;font-size:12px;padding:10px;">✓ Engine complete. Primary pattern: <strong>${engineResult.primary.name}</strong></div>
            <div class="state-controls"><button class="btn btn-primary" onclick="advanceState()">Continue</button></div>`;
        }
      }, 800);
      break;
    case 'diagnostics':
      if (!engineResult || !engineResult.primary) {
        body.innerHTML = `<div style="color:var(--text-muted);">No results.</div>`;
        break;
      }
      body.innerHTML = `<div style="font-size:12px;">
        <div style="margin-bottom:8px;"><strong>Primary:</strong> ${engineResult.primary.name} 
          <span class="severity-badge sev-badge-${engineResult.primary.severity}">${engineResult.primary.severity}</span></div>
        ${engineResult.secondary.length > 0 ? `<div><strong>Top Secondary:</strong> ${engineResult.secondary.sort((a,b) => (engineResult.weights[b.key]||0)-(engineResult.weights[a.key]||0))[0].name}</div>` : ''}
      </div>
      <div class="state-controls">
        <button class="btn btn-success" onclick="advanceState()">Confirm</button>
        <button class="btn btn-danger" onclick="goToState(3)">Reject — Back to Intake</button>
      </div>`;
      break;
    case 'diagnosis':
      if (!engineResult || !engineResult.primary) { body.innerHTML = ''; break; }
      const sp = engineResult.strategyPath;
      body.innerHTML = `<div style="font-size:12px;line-height:1.6;">
        <div><strong>Condition:</strong> ${engineResult.primary.description}</div>
        <div><strong>Risk:</strong> ${engineResult.primary.summary}</div>
        <div><strong>Strategy:</strong> ${sp ? sp.strategic_focus : 'None selected'}</div>
        <div><strong>Execution:</strong> ${engineResult.actions.length} representative actions available</div>
      </div>
      <div class="state-controls">
        ${engineResult.secondary.length > 0 ? `<button class="btn" onclick="advanceToTradeoff()">View Dual Pattern Tradeoff</button>` : ''}
        <button class="btn btn-primary" onclick="skipToActions()">Confirm Understanding</button>
      </div>`;
      break;
    case 'tradeoff':
      body.innerHTML = `<div style="font-size:12px;margin-bottom:10px;">
        <div>Primary: <strong>${engineResult.primary.name}</strong></div>
        <div>Secondary: <strong>${engineResult.secondary[0]?.name || 'None'}</strong></div>
      </div>
      <div class="state-controls">
        <button class="btn btn-primary" onclick="advanceState()">Focus on Primary</button>
        <button class="btn" onclick="advanceState()">Combine</button>
        <button class="btn" onclick="advanceState()">Sequence</button>
      </div>`;
      break;
    case 'actions':
      if (!engineResult) { body.innerHTML = ''; break; }
      body.innerHTML = `<div style="font-size:12px;margin-bottom:8px;">Select actions to execute:</div>` +
        engineResult.actions.map((a, i) => `<div class="action-item" style="cursor:pointer;" onclick="this.style.borderColor=this.style.borderColor==='rgb(74, 158, 255)'?'':'rgb(74, 158, 255)'">
          <input type="checkbox" id="action_${i}" checked> <label for="action_${i}">${a.ux_text || a.description}</label>
        </div>`).join('') +
        `<div class="state-controls"><button class="btn btn-primary" onclick="advanceState()">Confirm Actions</button></div>`;
      break;
    case 'monitoring':
      body.innerHTML = `<div class="state-controls">
        <button class="btn" onclick="advanceState()">Continue Monitoring</button>
        <button class="btn btn-primary" onclick="goToState(11)">Re-evaluate</button>
        <button class="btn" onclick="resetSimulator()">New Deal</button>
        <button class="btn btn-danger" onclick="resetSimulator()">Exit Session</button>
      </div>`;
      break;
    case 'reevaluating':
      body.innerHTML = `<div class="evaluating-pulse" style="text-align:center;padding:20px;font-size:14px;color:var(--accent);">Re-evaluating...</div>`;
      setTimeout(() => {
        if (engineResult) renderInspector(engineResult);
        body.innerHTML = `<div style="color:#4ade80;font-size:12px;padding:10px;">✓ Re-evaluation complete.</div>
          <div class="state-controls">
            <button class="btn btn-primary" onclick="goToState(7)">View Diagnosis</button>
            <button class="btn" onclick="goToState(10)">Back to Monitoring</button>
            <button class="btn btn-danger" onclick="resetSimulator()">Complete Session</button>
          </div>`;
      }, 600);
      break;
  }
}

function renderIntakeForm() {
  const stages = ["Discovery","Qualification","Evaluation","POC/Validation","Negotiation","Closed"];
  const offerings = ["Product","Services","Hybrid"];
  const usagePresence = ["No Usage","Limited Usage","Moderate Usage","Deep Usage"];
  const usageDepth = ["None","Surface","Moderate","Deep","Embedded"];
  const amounts = ["Small (<$50K)","Medium ($50K-$250K)","Large ($250K-$1M)","Enterprise ($1M+)"];
  const closeDates = ["Within 30 days","30-90 days","90-180 days","180+ days"];
  
  const makeSelect = (id, label, opts, selected) => `<div class="intake-field">
    <label>${label}</label>
    <select id="${id}">${opts.map(o => `<option value="${o}" ${o===selected?'selected':''}>${o}</option>`).join('')}</select>
  </div>`;
  
  let html = '<div class="intake-form">';
  html += makeSelect("intakeDealStage","Deal Stage",stages, stateData.dealStage||"Evaluation");
  html += makeSelect("intakeOffering","Offering Type",offerings,"Product");
  html += makeSelect("intakeUsagePresence","Usage Presence",usagePresence,"No Usage");
  html += makeSelect("intakeUsageDepth","Usage Depth",usageDepth,"None");
  html += makeSelect("intakeAmount","Deal Amount",amounts,"Medium ($50K-$250K)");
  html += makeSelect("intakeCloseDate","Close Date",closeDates,"90-180 days");
  html += '</div>';
  
  // Signal selector grouped by lever
  html += '<div class="signal-selector"><h4>Select Active Signals:</h4>';
  const groups = {};
  SIGNALS.forEach(s => {
    const lever = s.affected_levers[0] || "other";
    if (!groups[lever]) groups[lever] = [];
    groups[lever].push(s);
  });
  html += '<div class="quick-test-grid">';
  LEVER_ORDER.forEach(lever => {
    if (!groups[lever]) return;
    const leverObj = LEVERS.find(l => l.key === lever);
    html += `<div class="lever-group-title">${leverObj ? leverObj.name : lever}</div>`;
    groups[lever].forEach(s => {
      const checked = (stateData.selectedSignals || []).includes(s.key) ? 'checked' : '';
      html += `<div class="signal-check">
        <input type="checkbox" id="intake_${s.key}" value="${s.key}" ${checked}>
        <span class="severity-dot sev-${s.severity}"></span>
        <label for="intake_${s.key}">${s.name}</label>
        <span class="type-badge type-${s.type}">${s.type.replace('_',' ')}</span>
      </div>`;
    });
  });
  html += '</div></div>';
  html += `<div class="state-controls"><button class="btn btn-primary" onclick="submitIntake()">Submit Intake</button></div>`;
  return html;
}

function submitIntake() {
  stateData.dealStage = document.getElementById("intakeDealStage").value;
  stateData.offeringType = document.getElementById("intakeOffering").value;
  stateData.usagePresence = document.getElementById("intakeUsagePresence").value;
  stateData.usageDepth = document.getElementById("intakeUsageDepth").value;
  stateData.dealAmount = document.getElementById("intakeAmount").value;
  stateData.closeDate = document.getElementById("intakeCloseDate").value;
  stateData.selectedSignals = Array.from(document.querySelectorAll('#state-body-3 .signal-check input:checked')).map(cb => cb.value);
  
  if (stateData.selectedSignals.length === 0) {
    alert("Select at least one signal to proceed.");
    return;
  }
  advanceState();
}

function renderConfirmation() {
  let html = '<div style="font-size:12px;line-height:1.8;">';
  html += `<div><strong>Deal Stage:</strong> ${stateData.dealStage || '—'}</div>`;
  html += `<div><strong>Offering:</strong> ${stateData.offeringType || '—'}</div>`;
  html += `<div><strong>Signals (${(stateData.selectedSignals||[]).length}):</strong></div>`;
  (stateData.selectedSignals || []).forEach(sk => {
    const s = SIGNALS.find(x => x.key === sk);
    html += `<div style="padding-left:10px;">• ${s ? s.name : sk}</div>`;
  });
  html += '</div>';
  html += `<div class="state-controls">
    <button class="btn btn-success" onclick="advanceState()">Confirm & Run Engine</button>
    <button class="btn" onclick="goToState(3)">Adjust</button>
    <button class="btn btn-danger" onclick="goToState(3)">Reject</button>
  </div>`;
  return html;
}

function advanceState() {
  if (currentStateIdx === 1) {
    const textarea = document.getElementById("dealIntent");
    stateData.intent = textarea ? textarea.value : "";
  }
  
  // Mark current as completed
  if (currentStateIdx >= 0) {
    const card = document.getElementById(`state-${currentStateIdx}`);
    card.classList.remove('active');
    card.classList.add('completed');
    document.getElementById(`state-status-${currentStateIdx}`).textContent = '✓';
    document.getElementById(`state-status-${currentStateIdx}`).classList.add('done');
  }
  
  currentStateIdx++;
  if (currentStateIdx >= STATES.length) {
    currentStateIdx = STATES.length - 1;
    return;
  }
  
  const card = document.getElementById(`state-${currentStateIdx}`);
  card.classList.remove('future','collapsed');
  card.classList.add('active');
  document.getElementById(`state-status-${currentStateIdx}`).textContent = 'ACTIVE';
  document.getElementById(`state-status-${currentStateIdx}`).classList.add('current');
  
  document.getElementById("currentStateBadge").textContent = STATES[currentStateIdx].name;
  renderStateControls(currentStateIdx);
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function goToState(idx) {
  // Reset states from idx onwards
  for (let i = idx; i < STATES.length; i++) {
    const card = document.getElementById(`state-${i}`);
    card.classList.remove('active','completed','collapsed');
    card.classList.add('future');
    document.getElementById(`state-status-${i}`).textContent = '';
    document.getElementById(`state-status-${i}`).className = 'state-status';
    document.getElementById(`state-body-${i}`).innerHTML = '';
  }
  currentStateIdx = idx - 1;
  advanceState();
}

function advanceToTradeoff() {
  // Go from S8 to S9
  advanceState();
}

function skipToActions() {
  // Skip S9 (tradeoff) and go to S10 (actions)
  if (currentStateIdx === 7) {
    // Mark S8 done, skip S9, go to S10
    const s8 = document.getElementById(`state-${currentStateIdx}`);
    s8.classList.remove('active');
    s8.classList.add('completed');
    document.getElementById(`state-status-${currentStateIdx}`).textContent = '✓';
    document.getElementById(`state-status-${currentStateIdx}`).classList.add('done');
    
    // Skip S9
    currentStateIdx = 8;
    const s9 = document.getElementById(`state-${currentStateIdx}`);
    s9.classList.remove('future');
    s9.classList.add('completed');
    document.getElementById(`state-status-${currentStateIdx}`).textContent = 'SKIPPED';
    
    // Go to S10
    currentStateIdx = 9;
    const card = document.getElementById(`state-${currentStateIdx}`);
    card.classList.remove('future','collapsed');
    card.classList.add('active');
    document.getElementById(`state-status-${currentStateIdx}`).textContent = 'ACTIVE';
    document.getElementById(`state-status-${currentStateIdx}`).classList.add('current');
    document.getElementById("currentStateBadge").textContent = STATES[currentStateIdx].name;
    renderStateControls(currentStateIdx);
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function resetSimulator() {
  currentStateIdx = -1;
  stateData = {};
  engineResult = null;
  document.getElementById("inspectorResults").style.display = "none";
  document.getElementById("inspectorEmpty").style.display = "block";
  document.getElementById("currentStateBadge").textContent = "READY";
  initStateMachine();
}

/* ---- Schema Browser ---- */
const SCHEMA_TABS = [
  { name: "Signals", data: SIGNALS, cols: ["key","name","severity","type","polarity","affected_levers"] },
  { name: "Patterns", data: PATTERNS, cols: ["key","name","severity","type","polarity","affected_levers","candidate_strategy_path_keys"] },
  { name: "Strategy Paths", data: STRATEGY_PATHS, cols: ["key","display_name","mode","zone_bias","target_levers"] },
  { name: "Levers", data: LEVERS, cols: ["key","name","score_model","states"] },
  { name: "Zones", data: SALES_ZONES, cols: ["key","display_name","buyer_type","purpose"] },
  { name: "Actions", data: REPRESENTATIVE_ACTIONS, cols: ["action_key","parent_strategy_path","ux_text"] }
];
let activeSchemaTab = 0;

function initSchemaBrowser() {
  const tabs = document.getElementById("schemaTabs");
  tabs.innerHTML = SCHEMA_TABS.map((t,i) => `<div class="schema-tab ${i===0?'active':''}" onclick="switchSchemaTab(${i})">${t.name}</div>`).join('');
  renderSchemaTable(0);
}

function switchSchemaTab(idx) {
  activeSchemaTab = idx;
  document.querySelectorAll('.schema-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.getElementById("schemaSearch").value = '';
  renderSchemaTable(idx);
}

function renderSchemaTable(idx) {
  const tab = SCHEMA_TABS[idx];
  const container = document.getElementById("schemaContent");
  let html = '<table class="schema-table"><thead><tr>';
  tab.cols.forEach(c => html += `<th>${c}</th>`);
  html += '</tr></thead><tbody>';
  tab.data.forEach(row => {
    html += '<tr>';
    tab.cols.forEach(c => {
      let val = row[c];
      if (Array.isArray(val)) val = val.join(', ');
      if (val === undefined || val === null) val = '';
      html += `<td>${String(val).substring(0,100)}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function filterSchemaTable() {
  const q = document.getElementById("schemaSearch").value.toLowerCase();
  const rows = document.querySelectorAll("#schemaContent .schema-table tbody tr");
  rows.forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

/* ---- Initialize ---- */
document.addEventListener('DOMContentLoaded', () => {
  initQuickTest();
  initStateMachine();
  initSchemaBrowser();
});
</script>
